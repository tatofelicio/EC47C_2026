<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – ODS 4</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>

    <header>
      <nav>
        <ul>
          <li><a href="../index.html">Início</a></li>
          <li><a href="cadastro.html">Cadastro</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </header>

    <main>

      <section>
        <h1>Entrar</h1>
        <p>Acesse sua conta para participar da comunidade ODS 4.</p>

        <form id="loginForm" action="#" method="post">

          <div>
            <label for="usuario">Nome de usuário ou e-mail</label>
            <input
              type="text"
              id="usuario"
              name="usuario"
              placeholder="Seu usuário ou e-mail"
              required
              autocomplete="username"
            />
          </div>

          <div>
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Sua senha"
              required
              autocomplete="current-password"
            />
          </div>

          <div>
            <label>
              <input type="checkbox" name="lembrar" />
              Lembrar de mim
            </label>
          </div>

          <div>
            <button type="submit">Entrar</button>
          </div>

          <div>
            <a href="#">Esqueci minha senha</a>
          </div>

        </form>

        <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>.</p>

      </section>

    </main>

    <footer>
      <p>Trabalho Acadêmico &mdash; ODS 4 Educação de Qualidade &mdash; Agenda 2030 ONU</p>
    </footer>
    <script src="../js/login.js"></script>
  </body>
</html>
