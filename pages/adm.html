<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administração – ODS 4</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>

    <header>
      <nav>
        <ul>
          <li><a href="../index.html">Início</a></li>
          <li><a href="adm.html">ADM</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </header>

    <main>

      <section>
        <h1>Painel Administrativo</h1>
        <p>Preencha os campos abaixo para cadastrar novos usuários à aplicação.</p>

        <form id="cadastroForm" action="#" method="post">

          <fieldset>
            <legend>Dados Pessoais</legend>

            <div>
              <label for="nome">Nome completo</label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Seu nome completo"
                required
                minlength="5"
                maxlength="100"
                pattern="[A-Za-zÀ-ÿ\s]+"
                title="Digite apenas letras e espaços"
                autocomplete="name"
              />
            </div>

            <div>
              <label for="email">E-mail</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="seuemail@exemplo.com"
                required
                autocomplete="email"
              />
            </div>

            <div>
              <label for="data-nascimento">Data de nascimento</label>
              <input
                type="date"
                id="data-nascimento"
                name="data-nascimento"
                required
                min="1930-01-01"
                max="2015-12-31"
              />
            </div>

          </fieldset>

          <fieldset>
            <legend>Acesso</legend>

            <div>
              <label for="usuario">Nome de usuário</label>
              <input
                type="text"
                id="usuario"
                name="usuario"
                required
                minlength="4"
                maxlength="20"
                pattern="[a-zA-Z0-9_]+"
                title="Use apenas letras, números e _"
                autocomplete="username"
              />
            </div>

            <div>
              <label for="senha">Senha</label>
              <input
                type="password"
                id="senha"
                name="senha"
                required
                minlength="8"
                pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}"
                title="Mínimo 8 caracteres, uma letra maiúscula, uma minúscula e um número"
                autocomplete="new-password"
              />
            </div>

            <div>
              <label for="confirmar-senha">Confirmar senha</label>
              <input
                type="password"
                id="confirmar-senha"
                name="confirmar-senha"
                required
                minlength="8"
                autocomplete="new-password"
              />
            </div>

          </fieldset>

          <fieldset>
            <legend>Perfil</legend>

            <div>
              <label for="perfil">Você é:</label>
              <select id="perfil" name="perfil" required>
                <option value="" disabled selected>
                  Selecione...
                </option>
                <option value="estudante">Estudante</option>
                <option value="professor">Professor(a)</option>
                <option value="outro">Outro</option>
              </select>
            </div>
          </fieldset>

          <button type="submit">Cadastrar</button>
          <button type="button" onclick="limparFormulario()">Limpar</button>

        </form>

      </section>

      <section id="lista-container">
        <h2>Usuários Cadastrados</h2>
        
        <div style="margin-top: 20px; margin-bottom: 20px; display: flex; gap: 15px;">
          <button id="btnAbrirPesquisa" onclick="togglePesquisa()" style="background-color: #328cc1; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Pesquisar Usuários
          </button>

          <button id="btnExcluirTodos" onclick="excluirTodos()" style="background-color: #cccccc; color: #1d2731; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Excluir Todos os Itens
          </button>
        </div>

        <div id="containerPesquisa" style="display: none; margin-bottom: 20px; gap: 10px; align-items: center; background-color: #f4f4f9; padding: 15px; border-radius: 8px; border: 1px solid #ccc;">
          <select id="campoPesquisa" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            <option value="nome">Nome</option>
            <option value="email">E-mail</option>
            <option value="perfil">Perfil</option>
          </select>
          
          <input 
            type="text" 
            id="inputPesquisa" 
            placeholder="Digite para pesquisar..." 
            style="padding: 8px; width: 100%; border: 1px solid #ccc; border-radius: 4px;"
          >
          
          <button onclick="pesquisarUsuario()" style="background-color: #328cc1; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; white-space: nowrap;">
            Encontrar
          </button>
          
          <button onclick="limparPesquisa()" style="background-color: #cccccc; color: #1d2731; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; white-space: nowrap;">
            Limpar
          </button>
        </div>
        <ul id="listaUsuarios"></ul>
      </section>

    </main>

    <footer>
      <p>Trabalho Acadêmico &mdash; ODS 4 Educação de Qualidade &mdash; Agenda 2030 ONU</p>
    </footer>
    
    <script src="../js/admFunc.js"></script>
  </body>
</html>
